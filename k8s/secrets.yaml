# V8 — Kubernetes Secrets & ConfigMaps
# IMPORTANT: Replace placeholder values with real secrets before applying.
# In production, use sealed-secrets, external-secrets, or Vault.

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: attendance-system
type: Opaque
stringData:
  username: postgres
  password: REPLACE_WITH_SECURE_DB_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: attendance-system
type: Opaque
stringData:
  password: REPLACE_WITH_SECURE_REDIS_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: attendance-system
type: Opaque
stringData:
  DB_PASSWORD: REPLACE_WITH_SECURE_DB_PASSWORD
  JWT_ACCESS_SECRET: REPLACE_WITH_64_CHAR_HEX_SECRET
  JWT_REFRESH_SECRET: REPLACE_WITH_64_CHAR_HEX_SECRET
  REDIS_URL: "redis://:REPLACE_WITH_SECURE_REDIS_PASSWORD@redis:6379"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: attendance-system
data:
  NODE_ENV: production
  PORT: "3001"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: attendance_system
  DB_USER: postgres
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"
  FACE_AI_SERVICE_URL: "http://face-ai-service:8000"
  FRONTEND_URL: "http://frontend"
  RUN_MIGRATIONS: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-config
  namespace: attendance-system
data:
  PORT: "8000"
  MODEL_PATH: /app/models
  REDIS_HOST: redis
  REDIS_PORT: "6379"
