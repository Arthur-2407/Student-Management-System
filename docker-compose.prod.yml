services:
  # PostgreSQL Database
  student-db:
    image: postgres:15-alpine
    container_name: student-db-prod
    environment:
      POSTGRES_DB: student_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - student_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - student-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # PostgreSQL Face Database
  student-face-db:
    image: postgres:15-alpine
    container_name: student-face-db-prod
    environment:
      POSTGRES_DB: student_face_system
      POSTGRES_USER: face_admin
      POSTGRES_PASSWORD: ${FACE_DB_PASSWORD:-securefacepassword123}
    volumes:
      - student_postgres_face_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - student-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face_admin -d student_face_system"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis Cache
  student-redis:
    image: redis:7-alpine
    container_name: student-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword123} --appendonly yes
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword123}
    volumes:
      - student_redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - student-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redispassword123}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # Backend API
  student-backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile.prod
      network: host
    image: student-backend-api-prod:latest
    container_name: student-backend-prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=student-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-student_system}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - FACE_DB_HOST=student-face-db
      - FACE_DB_PORT=5432
      - FACE_DB_NAME=student_face_system
      - FACE_DB_USER=face_admin
      - FACE_DB_PASSWORD=${FACE_DB_PASSWORD:-securefacepassword123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword123}@student-redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-super-secret-jwt-access-key}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-jwt-refresh-key}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - FACE_AI_SERVICE_URL=http://student-face-ai:8000
      - FACE_AI_TIMEOUT_MS=${FACE_AI_TIMEOUT_MS:-15000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - RUN_MIGRATIONS=true
      - ACCOUNT_LOCKOUT_DISABLED=${ACCOUNT_LOCKOUT_DISABLED:-false}
    volumes:
      - student_backend_api_logs:/app/logs
      - student_backend_uploads:/app/uploads
    ports:
      - "3002:3001"
    networks:
      - student-network
    depends_on:
      student-db:
        condition: service_healthy
      student-face-db:
        condition: service_healthy
      student-redis:
        condition: service_healthy
      student-face-ai:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Face AI Service
  student-face-ai:
    build:
      context: ./face-ai-service
      dockerfile: Dockerfile.prod
      network: host
    image: student-face-ai-service-prod:latest
    container_name: student-face-ai-prod
    environment:
      - NODE_ENV=production
      - FACE_RECOGNITION_MODE=real
      - FACE_DETECTOR_BACKEND=${FACE_DETECTOR_BACKEND:-opencv}
      - FACE_AI_DISABLE_SPOOF_DETECTION=${FACE_AI_DISABLE_SPOOF_DETECTION:-false}
      - FACE_AI_DISABLE_LIVENESS_DETECTION=${FACE_AI_DISABLE_LIVENESS_DETECTION:-false}
      - PORT=8000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword123}@student-redis:6379
      - MODEL_PATH=/app/models
      - TORCH_HOME=/app/models
      # ── Biometric threshold overrides from .env (must be forwarded explicitly) ──
      - FACE_AI_LIVENESS_THRESHOLD=${FACE_AI_LIVENESS_THRESHOLD:-0.55}
      - FACE_AI_SPOOF_THRESHOLD=${FACE_AI_SPOOF_THRESHOLD:-0.55}
      - FACE_AI_SIMILARITY_THRESHOLD=${FACE_AI_SIMILARITY_THRESHOLD:-0.70}
      - FACE_AI_FLOW_ENTROPY_THRESHOLD=${FACE_AI_FLOW_ENTROPY_THRESHOLD:-1.5}
      - FACE_AI_MICRO_TEXTURE_VAR_THRESHOLD=${FACE_AI_MICRO_TEXTURE_VAR_THRESHOLD:-0.00015}
      - FACE_AI_EAR_THRESHOLD=${FACE_AI_EAR_THRESHOLD:-0.25}
      - FACE_AI_HEAD_MOVEMENT_THRESHOLD=${FACE_AI_HEAD_MOVEMENT_THRESHOLD:-0.02}
    volumes:
      - student_face_ai_models:/app/models
      - student_face_ai_logs:/app/logs
    networks:
      - student-network
    depends_on:
      student-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 900s

  # Frontend
  student-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      network: host
    image: student-frontend-prod:latest
    container_name: student-frontend-prod
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3002}
      - VITE_FACE_AI_URL=${FACE_AI_URL:-http://localhost:8001}
    networks:
      - student-network
    depends_on:
      student-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy
  student-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
      network: host
    image: student-nginx-prod:latest
    container_name: student-nginx-prod
    volumes:
      - student_nginx_logs:/var/log/nginx
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - student-network
    depends_on:
      - student-frontend
      - student-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  student-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  student_postgres_data:
    driver: local
  student_postgres_face_data:
    driver: local
  student_redis_data:
    driver: local
  student_face_ai_models:
    driver: local
  student_face_ai_logs:
    driver: local
  student_backend_api_logs:
    driver: local
  student_nginx_logs:
    driver: local
  student_backend_uploads:
    driver: local
