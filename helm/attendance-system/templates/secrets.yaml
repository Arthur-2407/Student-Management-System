apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: {{ .Values.secrets.dbName }}
  DB_USER: {{ .Values.secrets.dbUsername }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword }}
  REDIS_URL: "redis://:{{ .Values.secrets.redisPassword }}@redis:6379"
  JWT_SECRET: {{ .Values.secrets.jwtSecret }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret }}
  FACE_AI_SERVICE_URL: "http://face-ai-service:{{ .Values.aiService.port }}"
  FRONTEND_URL: "https://{{ .Values.ingress.host }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  username: {{ .Values.secrets.dbUsername }}
  password: {{ .Values.secrets.dbPassword }}
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  password: {{ .Values.secrets.redisPassword }}
