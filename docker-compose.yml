services:
  # PostgreSQL Database
  student-db:
    image: postgres:15-alpine
    container_name: student-db
    environment:
      POSTGRES_DB: ${DB_NAME:-student_system}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - student_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    networks:
      - student-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Face Database
  student-face-db:
    image: postgres:15-alpine
    container_name: student-face-db
    environment:
      POSTGRES_DB: ${FACE_DB_NAME:-student_face_system}
      POSTGRES_USER: ${FACE_DB_USER:-face_admin}
      POSTGRES_PASSWORD: ${FACE_DB_PASSWORD:-securefacepassword123}
    volumes:
      - student_postgres_face_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - student-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face_admin -d student_face_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  student-redis:
    image: redis:7-alpine
    container_name: student-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword123}
    volumes:
      - student_redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Face AI Service
  student-face-ai:
    build: ./face-ai-service
    container_name: student-face-ai
    environment:
      - NODE_ENV=production
      - FACE_RECOGNITION_MODE=real
      - FACE_DETECTOR_BACKEND=${FACE_DETECTOR_BACKEND:-opencv}
      - FACE_AI_DISABLE_SPOOF_DETECTION=false
      - FACE_AI_DISABLE_LIVENESS_DETECTION=false
      - PORT=8000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword123}@student-redis:6379
      - MODEL_PATH=/app/models
      - TORCH_HOME=/app/models
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-super-secret-jwt-access-key-change-in-production}
      - E2E_BYPASS_KEY=${E2E_BYPASS_KEY}
    volumes:
      - ./face-ai-service:/app
      - student_face_ai_models:/app/models
    ports:
      - "8001:8000"
    networks:
      - student-network
    depends_on:
      student-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 900s

  # Backend API
  student-backend:
    build: ./backend-api
    container_name: student-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=student-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-student_system}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - FACE_DB_HOST=student-face-db
      - FACE_DB_PORT=5432
      - FACE_DB_NAME=${FACE_DB_NAME:-student_face_system}
      - FACE_DB_USER=${FACE_DB_USER:-face_admin}
      - FACE_DB_PASSWORD=${FACE_DB_PASSWORD:-securefacepassword123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword123}@student-redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-super-secret-jwt-access-key-change-in-production}
      - E2E_BYPASS_KEY=${E2E_BYPASS_KEY}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-jwt-refresh-key-change-in-production}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - FACE_AI_SERVICE_URL=${FACE_AI_SERVICE_URL:-http://student-face-ai:8000}
      - FACE_AI_TIMEOUT_MS=${FACE_AI_TIMEOUT_MS:-15000}
      - FRONTEND_URL=http://localhost:3003
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-500}
      - AUTH_RATE_LIMIT_WINDOW_MS=${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      - AUTH_RATE_LIMIT_MAX_REQUESTS=${AUTH_RATE_LIMIT_MAX_REQUESTS:-200}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-100}
      - LOGIN_RATE_WINDOW_MS=${LOGIN_RATE_WINDOW_MS:-60000}
      - ACCOUNT_LOCKOUT_DISABLED=${ACCOUNT_LOCKOUT_DISABLED:-false}
      - MAX_FAILED_LOGINS=${MAX_FAILED_LOGINS:-10}
      - LOGIN_LOCKOUT_MINUTES=${LOGIN_LOCKOUT_MINUTES:-30}
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    ports:
      - "3002:3001"
    networks:
      - student-network
    depends_on:
      student-db:
        condition: service_healthy
      student-face-db:
        condition: service_healthy
      student-redis:
        condition: service_healthy
      student-face-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http'); const req=http.get('http://localhost:3001/health', res => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React Application
  student-frontend:
    build: ./frontend
    container_name: student-frontend
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3002}
      - VITE_FACE_AI_URL=${FACE_AI_URL:-http://localhost:8001}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3003:80"
    networks:
      - student-network
    depends_on:
      - student-backend
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy
  student-nginx:
    image: nginx:alpine
    container_name: student-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - student-network
    depends_on:
      - student-frontend
      - student-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health && wget -q -O /dev/null http://127.0.0.1/frontend-status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  student-network:
    driver: bridge

volumes:
  student_postgres_data:
  student_postgres_face_data:
  student_redis_data:
  student_face_ai_models:
