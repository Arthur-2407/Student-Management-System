# V5 — Frontend Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: attendance-system
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: attendance-system/frontend:latest
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: attendance-system
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
---
# V5 — Face AI Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-ai-service
  namespace: attendance-system
  labels:
    app: face-ai-service
    tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: face-ai-service
  template:
    metadata:
      labels:
        app: face-ai-service
        tier: ai
    spec:
      containers:
        - name: face-ai-service
          image: attendance-system/face-ai-service:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ai-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: face-ai-service
  namespace: attendance-system
spec:
  selector:
    app: face-ai-service
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
