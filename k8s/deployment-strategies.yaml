# V8 — Canary + Blue-Green Deployment Manifests
# These resources enable zero-downtime deployment strategies.

# ── Canary Deployment ───────────────────────────────────────────────────────
# Runs a small % of traffic to the new version before full rollout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-canary
  namespace: attendance-system
  labels:
    app: backend-api
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
      track: canary
  template:
    metadata:
      labels:
        app: backend-api
        track: canary
        version: canary
    spec:
      containers:
        - name: backend-api
          image: attendance/backend-api:canary
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: CANARY
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# Canary service — routes a subset of traffic
apiVersion: v1
kind: Service
metadata:
  name: backend-api-canary
  namespace: attendance-system
  labels:
    app: backend-api
    track: canary
spec:
  selector:
    app: backend-api
    track: canary
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
# ── Blue-Green Switchover Service ───────────────────────────────────────────
# Points to either "blue" or "green" via selector swap.
apiVersion: v1
kind: Service
metadata:
  name: backend-api-live
  namespace: attendance-system
  labels:
    app: backend-api
    strategy: blue-green
  annotations:
    deployment.strategy: "blue-green"
    active-color: "blue"
spec:
  selector:
    app: backend-api
    color: blue  # Switch to "green" for cutover
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
# Blue deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-blue
  namespace: attendance-system
  labels:
    app: backend-api
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
      color: blue
  template:
    metadata:
      labels:
        app: backend-api
        color: blue
    spec:
      containers:
        - name: backend-api
          image: attendance/backend-api:stable
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
# Green deployment (initially scaled to 0)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-green
  namespace: attendance-system
  labels:
    app: backend-api
    color: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: backend-api
      color: green
  template:
    metadata:
      labels:
        app: backend-api
        color: green
    spec:
      containers:
        - name: backend-api
          image: attendance/backend-api:next
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
# ── PodDisruptionBudget ─────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-api-pdb
  namespace: attendance-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend-api
